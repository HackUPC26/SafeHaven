<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#050810"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SafeHaven"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<link rel="manifest" href="manifest.json"/>
<title>SafeHaven — Receiver</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;overflow:hidden;}
body{
  background:#050810;
  font-family:-apple-system,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  color:#fff;
}
::-webkit-scrollbar{display:none;}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(255,59,92,.6);}50%{box-shadow:0 0 0 8px rgba(255,59,92,0);}}
@keyframes pulseAmber{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.5);}50%{box-shadow:0 0 0 8px rgba(245,158,11,0);}}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(0,208,100,.4);}50%{box-shadow:0 0 0 6px rgba(0,208,100,0);}}
@keyframes scanline{0%{transform:translateY(-100%);}100%{transform:translateY(500px);}}
@keyframes recBlink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes wvUp{0%,100%{transform:scaleY(.15);}50%{transform:scaleY(1);}}
@keyframes alertPulse{0%,100%{background:rgba(255,59,92,.1);}50%{background:rgba(255,59,92,.2);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const WAVE_H   = Array.from({length:44}, ()=> 0.1 + Math.random() * 0.9);
const WAVE_DUR = Array.from({length:44}, ()=> (0.3 + Math.random() * 0.6).toFixed(2));
const WAVE_DEL = Array.from({length:44}, (_,i)=> (i * 0.018).toFixed(3));

const AUDIO_LABELS = [
  {time:'14:32:51', type:'impact',  label:'Screaming — female, sustained',  conf:97},
  {time:'14:32:44', type:'impact',  label:'Impact sound detected',           conf:81},
  {time:'14:32:38', type:'shout',   label:'Raised voice — male',             conf:88},
  {time:'14:32:30', type:'shout',   label:'Raised voice — female',           conf:91},
  {time:'14:32:22', type:'impact',  label:'Loud impact / object strike',     conf:76},
  {time:'14:32:15', type:'silence', label:'Brief silence (3.1 s)',           conf:99},
  {time:'14:32:08', type:'shout',   label:'Raised voices — overlapping',     conf:85},
  {time:'14:31:55', type:'speech',  label:'Normal speech — two voices',      conf:94},
  {time:'14:31:40', type:'silence', label:'Ambient noise only',              conf:98},
];

const INCIDENT_LOG = [
  {time:'14:32:51', dot:'red',   label:'Screaming detected',          sub:'AI audio — 97% confidence'},
  {time:'14:32:44', dot:'red',   label:'Safe phrase triggered',       sub:'"I need to check the forecast"'},
  {time:'14:32:38', dot:'amber', label:'Raised male voice',           sub:'Audio AI — 88% confidence'},
  {time:'14:32:22', dot:'red',   label:'Impact sound',                sub:'Audio AI — 76% confidence'},
  {time:'14:31:55', dot:'grey',  label:'Brief silence (3.1 s)',       sub:'Possible controlled situation'},
  {time:'14:31:08', dot:'amber', label:'Defensive posture detected',  sub:'Video AI — Person 1'},
  {time:'14:30:40', dot:'blue',  label:'Location update',             sub:'Carrer de Provença, 289'},
  {time:'14:29:55', dot:'grey',  label:'Session started',             sub:'Ana López · iPhone 15 Pro'},
];

const dotColor = {red:'#ff3b5c', amber:'#f59e0b', grey:'#475569', blue:'#3b82f6'};

// ── Barcelona map ──────────────────────────────────────────────
function BarcelonaMap({alertMode}) {
  const lx = alertMode ? 185 : 210, ly = alertMode ? 142 : 155;
  const blocks = [];
  for(let r=0;r<9;r++) for(let c=0;c<11;c++){
    const x=28+c*34, y=28+r*34, C=5, w=26, h=26;
    const pts=[[x+C,y],[x+w-C,y],[x+w,y+C],[x+w,y+h-C],[x+w-C,y+h],[x+C,y+h],[x,y+h-C],[x,y+C]].map(p=>p.join(',')).join(' ');
    blocks.push(<polygon key={`${r}-${c}`} points={pts} fill="#0e1b2b" stroke="#172438" strokeWidth="0.8"/>);
  }
  return (
    <svg viewBox="0 0 362 270" width="100%" style={{display:'block'}}>
      <rect width="362" height="270" fill="#091420"/>
      {[38,72,106,140,174,208,242].map((y,i)=><line key={`h${i}`} x1="0" y1={y} x2="362" y2={y} stroke={i===3?'#1e3060':'#111f35'} strokeWidth={i===3?5:3}/>)}
      {[28,62,96,130,164,198,232,266,300,334].map((x,i)=><line key={`v${i}`} x1={x} y1="0" x2={x} y2="270" stroke={i===5?'#1e3060':'#111f35'} strokeWidth={i===5?5:3}/>)}
      <line x1="0" y1="70" x2="362" y2="210" stroke="#1a2a50" strokeWidth="6"/>
      {blocks}
      <text x="167" y="85" fontSize="7" fill="#2244aa" fontFamily="monospace" transform="rotate(-90,167,85)" textAnchor="middle">Pg. de Gràcia</text>
      <polygon points="233,105 227,121 239,121" fill="#162040" stroke="#223a6a" strokeWidth="1"/>
      <text x="243" y="117" fontSize="7" fill="#2a4880" fontFamily="system-ui">Sagrada Família</text>
      <text x="110" y="165" fontSize="8" fill="#162236" fontFamily="system-ui" letterSpacing="3">EIXAMPLE</text>
      <rect x="280" y="230" width="82" height="40" fill="#0a1d36" rx="3"/>
      <text x="295" y="253" fontSize="7" fill="#133060" fontFamily="system-ui">Mediterrani</text>
      {alertMode && <>
        <circle cx={lx} cy={ly} r="10" fill="none" stroke="#ff3b5c" strokeWidth="1.5">
          <animate attributeName="r" values="10;28" dur="1.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".7;0" dur="1.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx={lx} cy={ly} r="10" fill="none" stroke="#ff3b5c" strokeWidth="1.5">
          <animate attributeName="r" values="10;28" dur="1.4s" begin=".5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".7;0" dur="1.4s" begin=".5s" repeatCount="indefinite"/>
        </circle>
      </>}
      {!alertMode && <circle cx={lx} cy={ly} r="10" fill="none" stroke="#3b82f6" strokeWidth="1">
        <animate attributeName="r" values="8;20" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".5;0" dur="2.5s" repeatCount="indefinite"/>
      </circle>}
      <circle cx={lx} cy={ly} r="22" fill={alertMode?'rgba(255,59,92,.06)':'rgba(59,130,246,.07)'} stroke={alertMode?'rgba(255,59,92,.25)':'rgba(59,130,246,.2)'} strokeWidth="1"/>
      <circle cx={lx} cy={ly} r="6" fill={alertMode?'#ff3b5c':'#3b82f6'} stroke={alertMode?'#ff8099':'#93c5fd'} strokeWidth="2"/>
      <rect x={lx+10} y={ly-20} width="128" height="16" rx="3" fill="rgba(5,12,24,.9)"/>
      <text x={lx+14} y={ly-8} fontSize="8" fill={alertMode?'#ff8099':'#6eaaff'} fontFamily="monospace">41.3970° N  2.1606° E</text>
      <defs><radialGradient id="vig" cx="50%" cy="50%" r="70%"><stop offset="0%" stopColor="transparent"/><stop offset="100%" stopColor="rgba(5,10,20,.5)"/></radialGradient></defs>
      <rect width="362" height="270" fill="url(#vig)"/>
    </svg>
  );
}

// ── video feed ─────────────────────────────────────────────────
function VideoFeed({alertMode, frozen, staleSecs}) {
  const ac = alertMode ? '#ff3b5c' : '#22d3ee';
  return (
    <div style={{position:'relative',height:280,background:'#080c10',overflow:'hidden',borderRadius:12,flexShrink:0}}>
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:'58%',background:'#0d1118'}}/>
      <div style={{position:'absolute',top:0,left:0,right:0,height:'42%',background:'#080c10'}}/>
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:24,background:'#0a0e14'}}/>
      <div style={{position:'absolute',bottom:24,right:20,width:60,height:48,background:'#0c1120',border:'1px solid #141e30',borderRadius:2}}/>
      <div style={{position:'absolute',left:'22%',bottom:24}}>
        <div style={{width:34,height:90,background:'#111820',borderRadius:'40% 40% 10% 10%',position:'relative'}}>
          <div style={{position:'absolute',top:-22,left:'50%',transform:'translateX(-50%)',width:20,height:22,background:'#111820',borderRadius:'50%'}}/>
        </div>
      </div>
      <div style={{position:'absolute',left:'60%',bottom:24}}>
        <div style={{width:28,height:58,background:'#101620',borderRadius:'30% 30% 10% 10%',position:'relative'}}>
          <div style={{position:'absolute',top:-18,left:'50%',transform:'translateX(-50%)',width:17,height:18,background:'#101620',borderRadius:'50%'}}/>
        </div>
      </div>
      <div style={{position:'absolute',left:'calc(22% - 8px)',bottom:22,width:52,height:118,border:`1.5px solid ${ac}`,boxShadow:`0 0 8px ${alertMode?'rgba(255,59,92,.3)':'rgba(34,211,238,.2)'}`,borderRadius:4,pointerEvents:'none'}}>
        <div style={{position:'absolute',top:-20,left:0,background:ac,color:'#000',fontSize:9,fontWeight:700,fontFamily:'monospace',padding:'2px 5px',borderRadius:'3px 3px 3px 0',whiteSpace:'nowrap'}}>
          P1 · {alertMode?'DEFENSIVE POSTURE':'Standing'} · {alertMode?'94%':'87%'}
        </div>
      </div>
      <div style={{position:'absolute',left:'calc(60% - 6px)',bottom:22,width:42,height:82,border:'1.5px solid #f59e0b',boxShadow:'0 0 8px rgba(245,158,11,.2)',borderRadius:4,pointerEvents:'none'}}>
        <div style={{position:'absolute',top:-20,left:0,background:'#f59e0b',color:'#000',fontSize:9,fontWeight:700,fontFamily:'monospace',padding:'2px 5px',borderRadius:'3px 3px 3px 0',whiteSpace:'nowrap'}}>
          P2 · Seated · 82%
        </div>
      </div>
      <div style={{position:'absolute',bottom:8,left:8,background:'rgba(5,10,20,.85)',borderRadius:6,padding:'4px 8px',display:'flex',gap:8}}>
        {['Indoor','Kitchen','Low light'].map(l=>(
          <span key={l} style={{color:'rgba(255,255,255,.55)',fontSize:9,fontFamily:'monospace'}}>{l}</span>
        ))}
      </div>
      <div style={{position:'absolute',top:10,right:10,background:'rgba(5,10,20,.85)',borderRadius:6,padding:'4px 8px',color:ac,fontSize:10,fontWeight:700,fontFamily:'monospace'}}>2 PERSONS</div>
      {!frozen ? (
        <div style={{position:'absolute',top:10,left:10,display:'flex',alignItems:'center',gap:5}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:'#ff3b5c',animation:'recBlink 1s ease-in-out infinite'}}/>
          <span style={{color:'#fff',fontSize:10,fontWeight:700,fontFamily:'monospace',letterSpacing:1}}>LIVE</span>
        </div>
      ) : (
        <div style={{position:'absolute',inset:0,background:'rgba(5,10,18,.7)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6}}>
          <div style={{color:'#f59e0b',fontSize:12,fontWeight:700,letterSpacing:1,fontFamily:'monospace'}}>FEED FROZEN</div>
          <div style={{color:'rgba(255,255,255,.45)',fontSize:10,fontFamily:'monospace'}}>Last frame 14:32:18 · {staleSecs}s ago</div>
          <div style={{color:'rgba(255,255,255,.3)',fontSize:9,fontFamily:'monospace'}}>Annotations from last known frame</div>
        </div>
      )}
      {!frozen && <div style={{position:'absolute',left:0,right:0,height:40,background:'linear-gradient(transparent,rgba(255,255,255,.025),transparent)',animation:'scanline 3s linear infinite',pointerEvents:'none'}}/>}
      {[[0,0],[1,0],[0,1],[1,1]].map(([cx,cy],i)=>(
        <div key={i} style={{position:'absolute',[cx?'right':'left']:8,[cy?'bottom':'top']:8,width:16,height:16,borderTop:cy?'none':`1.5px solid ${ac}`,borderBottom:cy?`1.5px solid ${ac}`:'none',borderLeft:cx?'none':`1.5px solid ${ac}`,borderRight:cx?`1.5px solid ${ac}`:'none',opacity:.7}}/>
      ))}
    </div>
  );
}

// ── audio panel ────────────────────────────────────────────────
function AudioPanel({alertMode}) {
  const typeColor = {impact:'#ff3b5c', shout:'#f59e0b', silence:'#475569', speech:'#3b82f6'};
  return (
    <div style={{display:'flex',flexDirection:'column'}}>
      <div style={{background:'#080e1a',borderRadius:'12px 12px 0 0',padding:'10px 12px 8px',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:alertMode?'#ff3b5c':'#3b82f6',animation:'recBlink 1s ease-in-out infinite'}}/>
          <span style={{color:'rgba(255,255,255,.5)',fontSize:10,fontFamily:'monospace',letterSpacing:1}}>LIVE AUDIO</span>
          <span style={{marginLeft:'auto',color:'rgba(255,255,255,.25)',fontSize:10,fontFamily:'monospace'}}>48 kHz · mono</span>
        </div>
        <div style={{display:'flex',gap:2,alignItems:'center',height:56,overflow:'hidden'}}>
          {WAVE_H.map((h,i)=>(
            <div key={i} style={{flex:1,borderRadius:2,transformOrigin:'center',background:alertMode?`rgba(255,${Math.round(59+h*40)},92,${0.5+h*0.5})`:`rgba(59,130,${Math.round(200+h*55)},${0.4+h*0.6})`,animation:`wvUp ${WAVE_DUR[i]}s ease-in-out infinite alternate`,animationDelay:`${WAVE_DEL[i]}s`,height:'100%'}}/>
          ))}
        </div>
      </div>
      <div style={{background:'#080e1a',borderRadius:'0 0 12px 12px',overflowY:'auto',scrollbarWidth:'none'}}>
        {AUDIO_LABELS.map((item,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderBottom:i<AUDIO_LABELS.length-1?'1px solid rgba(255,255,255,.05)':'none',background:i===0&&alertMode?'rgba(255,59,92,.07)':'transparent'}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:typeColor[item.type],flexShrink:0,boxShadow:i===0?`0 0 6px ${typeColor[item.type]}`:'none'}}/>
            <div style={{color:'rgba(255,255,255,.3)',fontSize:10,fontFamily:'monospace',flexShrink:0,width:50}}>{item.time}</div>
            <div style={{flex:1,color:i===0?'#e2e8f0':'rgba(255,255,255,.6)',fontSize:12,fontWeight:i===0?600:400}}>{item.label}</div>
            <div style={{fontSize:10,fontFamily:'monospace',flexShrink:0,color:item.conf>=90?typeColor[item.type]:'rgba(255,255,255,.3)'}}>{item.conf}%</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── risk banner ────────────────────────────────────────────────
function RiskBanner({level}) {
  const cfg = {
    HIGH: {bg:'rgba(255,59,92,.12)', border:'rgba(255,59,92,.45)', dot:'#ff3b5c', dotAnim:'pulseDot',   tag:'HIGH RISK',  text:'Screaming, impact sounds & defensive posture detected. Recommend immediate intervention.', tagBg:'#ff3b5c'},
    MED:  {bg:'rgba(245,158,11,.09)',border:'rgba(245,158,11,.4)', dot:'#f59e0b', dotAnim:'pulseAmber', tag:'ELEVATED',   text:'Raised voices and restricted movement detected. Situation deteriorating.', tagBg:'#f59e0b'},
    LOW:  {bg:'rgba(0,208,100,.06)', border:'rgba(0,208,100,.3)', dot:'#00d064', dotAnim:'pulseGreen', tag:'MONITORING', text:'All signals within normal range. No anomalies detected.', tagBg:'#00d064'},
  }[level];
  return (
    <div style={{background:cfg.bg,border:`1px solid ${cfg.border}`,borderRadius:12,padding:'11px 14px',display:'flex',alignItems:'flex-start',gap:10,animation:level==='HIGH'?'alertPulse 2s ease-in-out infinite':'none'}}>
      <div style={{width:9,height:9,borderRadius:'50%',background:cfg.dot,marginTop:4,flexShrink:0,animation:`${cfg.dotAnim} 1.5s ease-in-out infinite`}}/>
      <div style={{flex:1}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
          <span style={{background:cfg.tagBg,color:'#000',fontSize:9,fontWeight:800,letterSpacing:1,padding:'2px 7px',borderRadius:99,fontFamily:'monospace'}}>{cfg.tag}</span>
          <span style={{color:'rgba(255,255,255,.3)',fontSize:10,fontFamily:'monospace'}}>AI synthesis · 3 signals</span>
        </div>
        <div style={{color:'rgba(255,255,255,.75)',fontSize:12,lineHeight:1.5}}>{cfg.text}</div>
      </div>
    </div>
  );
}

// ── stat pill ──────────────────────────────────────────────────
function Pill({label,value,color='#3b82f6'}) {
  return (
    <div style={{flex:1,background:'rgba(255,255,255,.04)',border:'0.5px solid rgba(255,255,255,.07)',borderRadius:12,padding:'10px 12px'}}>
      <div style={{color:'rgba(255,255,255,.35)',fontSize:10,letterSpacing:.5,marginBottom:3}}>{label}</div>
      <div style={{color,fontSize:16,fontWeight:700,fontFamily:'monospace'}}>{value}</div>
    </div>
  );
}

// ── incident log ───────────────────────────────────────────────
function IncidentLog() {
  return (
    <div style={{display:'flex',flexDirection:'column'}}>
      {INCIDENT_LOG.map((item,i)=>(
        <div key={i} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'11px 14px',borderBottom:i<INCIDENT_LOG.length-1?'1px solid rgba(255,255,255,.05)':'none',background:i<2&&item.dot==='red'?'rgba(255,59,92,.06)':'transparent'}}>
          <div style={{paddingTop:4}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:dotColor[item.dot],flexShrink:0,boxShadow:i===0?`0 0 8px ${dotColor[item.dot]}`:'none'}}/>
          </div>
          <div style={{flex:1}}>
            <span style={{color:i<2?'#e2e8f0':'rgba(255,255,255,.65)',fontSize:13,fontWeight:i<2?600:400}}>{item.label}</span>
            <div style={{color:'rgba(255,255,255,.35)',fontSize:11,marginTop:2}}>{item.sub}</div>
          </div>
          <div style={{color:'rgba(255,255,255,.25)',fontSize:10,fontFamily:'monospace',flexShrink:0,paddingTop:2}}>{item.time}</div>
        </div>
      ))}
    </div>
  );
}

// ── app ────────────────────────────────────────────────────────
function App() {
  const [alertMode, setAlertMode] = useState(()=> localStorage.getItem('sh_alert')==='true');
  const [tab, setTab]             = useState(()=> localStorage.getItem('sh_tab')||'live');
  const [frozen, setFrozen]       = useState(false);
  const [elapsed, setElapsed]     = useState(0);
  const [staleSecs, setStaleSecs] = useState(0);
  const [clock, setClock]         = useState('');

  useEffect(()=>{
    const tick = ()=>{
      const n = new Date();
      setClock(`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`);
    };
    tick();
    const id = setInterval(tick, 15000);
    return ()=> clearInterval(id);
  },[]);

  useEffect(()=>{ const id=setInterval(()=>setElapsed(e=>e+1),1000); return()=>clearInterval(id); },[]);
  useEffect(()=>{
    if(frozen){ const id=setInterval(()=>setStaleSecs(s=>s+1),1000); return()=>clearInterval(id); }
    else setStaleSecs(0);
  },[frozen]);

  const toggle = ()=>{ const n=!alertMode; setAlertMode(n); localStorage.setItem('sh_alert',n); };
  const goTab  = t =>{ setTab(t); localStorage.setItem('sh_tab',t); };

  const riskLevel = alertMode ? 'HIGH' : 'LOW';
  const base = elapsed + 1335;
  const mm = String(Math.floor(base/60)).padStart(2,'0');
  const ss = String(base%60).padStart(2,'0');

  return (
    <div style={{
      display:'flex', flexDirection:'column', height:'100%', overflow:'hidden',
      paddingTop:'env(safe-area-inset-top)',
    }}>

      {/* ── FIXED HEADER ── */}
      <div style={{flexShrink:0, background:'#050810'}}>
        {/* status bar */}
        <div style={{padding:'10px 20px 6px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <span style={{fontSize:15, fontWeight:600, color:'#fff'}}>{clock}</span>
          <span style={{color:'rgba(255,255,255,.5)', fontSize:12, fontFamily:'monospace'}}>●●●  WiFi  72%</span>
        </div>

        <div style={{padding:'0 14px'}}>
          {/* session header */}
          <div style={{display:'flex', alignItems:'center', gap:12, padding:'4px 2px 10px'}}>
            <div style={{width:44,height:44,borderRadius:'50%',flexShrink:0,background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:18,fontWeight:700}}>A</div>
            <div style={{flex:1}}>
              <div style={{display:'flex', alignItems:'center', gap:7}}>
                <span style={{color:'#fff', fontSize:16, fontWeight:700}}>Ana López</span>
                <span style={{background:'rgba(59,130,246,.2)',border:'1px solid rgba(59,130,246,.4)',color:'#93c5fd',fontSize:9,fontWeight:700,letterSpacing:.5,padding:'2px 7px',borderRadius:99,fontFamily:'monospace'}}>TIER 2</span>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:8, marginTop:3}}>
                <span style={{color:'rgba(255,255,255,.35)',fontSize:11,fontFamily:'monospace'}}>{mm}:{ss}</span>
                <span style={{color:'rgba(255,255,255,.2)',fontSize:11}}>·</span>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <div style={{width:5,height:5,borderRadius:'50%',background:'#00d064'}}/>
                  <span style={{color:'rgba(0,208,100,.7)',fontSize:11}}>Connected</span>
                </div>
              </div>
            </div>
          </div>

          {/* risk banner */}
          <div style={{marginBottom:8}}><RiskBanner level={riskLevel}/></div>

          {/* tabs */}
          <div style={{display:'flex',gap:3,background:'rgba(255,255,255,.05)',borderRadius:12,padding:3,marginBottom:8}}>
            {[['live','Live'],['map','Map'],['log','Log']].map(([id,label])=>(
              <div key={id} onClick={()=>goTab(id)} style={{flex:1,padding:'8px',textAlign:'center',borderRadius:9,cursor:'pointer',background:tab===id?'rgba(255,255,255,.15)':'transparent',color:tab===id?'#fff':'rgba(255,255,255,.4)',fontSize:13,fontWeight:tab===id?600:400,transition:'all .2s'}}>
                {label}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── SCROLLABLE CONTENT ── */}
      <div style={{flex:1, overflowY:'auto', overflowX:'hidden', scrollbarWidth:'none'}}>
        {tab==='live' && (
          <div style={{display:'flex',flexDirection:'column',gap:10,animation:'slideUp .3s ease',padding:'0 14px 14px'}}>
            <VideoFeed alertMode={alertMode} frozen={frozen} staleSecs={staleSecs}/>
            <AudioPanel alertMode={alertMode}/>
          </div>
        )}

        {tab==='map' && (
          <div style={{display:'flex',flexDirection:'column',gap:10,animation:'slideUp .3s ease',paddingBottom:14}}>
            <div style={{position:'relative'}}>
              <BarcelonaMap alertMode={alertMode}/>
              <div style={{position:'absolute',bottom:8,left:8,background:'rgba(5,10,20,.9)',borderRadius:8,padding:'6px 10px',border:`1px solid ${alertMode?'rgba(255,59,92,.4)':'rgba(59,130,246,.3)'}`}}>
                <div style={{color:alertMode?'#ff8099':'#93c5fd',fontSize:11,fontWeight:600}}>
                  {alertMode ? '⚠ Carrer de Provença, 289' : '📍 Carrer de Mallorca, 256'}
                </div>
                <div style={{color:'rgba(255,255,255,.35)',fontSize:10,marginTop:1,fontFamily:'monospace'}}>41.3970° N · 2.1606° E · ±4 m</div>
              </div>
            </div>
            <div style={{padding:'0 14px', display:'flex', flexDirection:'column', gap:10}}>
              <div style={{display:'flex',gap:8}}>
                <Pill label="BATTERY"  value="72%"                        color="#34d399"/>
                <Pill label="ACCURACY" value="4 m"                        color="#3b82f6"/>
                <Pill label="SPEED"    value={alertMode?'3.2 km/h':'0 km/h'} color="#a78bfa"/>
              </div>
              <div style={{display:'flex',gap:8}}>
                <Pill label="HEADING"  value="NE 52°" color="#f59e0b"/>
                <Pill label="ALTITUDE" value="11 m"   color="#38bdf8"/>
                <Pill label="SIGNAL"   value="Strong" color="#34d399"/>
              </div>
            </div>
          </div>
        )}

        {tab==='log' && (
          <div style={{animation:'slideUp .3s ease',background:'#080e1a',borderRadius:12,overflow:'hidden',margin:'0 14px 14px'}}>
            <IncidentLog/>
          </div>
        )}
      </div>

      {/* ── FIXED FOOTER ── */}
      <div style={{
        flexShrink:0, background:'#060b14',
        borderTop:'1px solid rgba(255,255,255,.07)',
        padding:'12px 14px',
        paddingBottom:'calc(12px + env(safe-area-inset-bottom))',
      }}>
        {/* Call Police */}
        <div onClick={()=>{}} style={{
          background:alertMode?'linear-gradient(135deg,#ff3b5c,#c0002e)':'linear-gradient(135deg,#1d3a5f,#0f2240)',
          borderRadius:14, padding:'15px', textAlign:'center', cursor:'pointer',
          boxShadow:alertMode?'0 4px 20px rgba(255,59,92,.45)':'none',
          border:alertMode?'1px solid rgba(255,100,120,.3)':'1px solid rgba(59,130,246,.2)',
          transition:'all .3s', marginBottom:8,
        }}>
          <div style={{color:'#fff',fontSize:16,fontWeight:700}}>
            {alertMode ? '🚨 Call Police with Location' : '📞 Call Police with Location'}
          </div>
          <div style={{color:'rgba(255,255,255,.5)',fontSize:11,marginTop:3,fontFamily:'monospace'}}>
            41.3970° N · 2.1606° E · Barcelona
          </div>
        </div>

        {/* Save Evidence */}
        <div style={{background:'rgba(255,255,255,.04)',borderRadius:14,padding:'12px',textAlign:'center',cursor:'pointer',border:'1px solid rgba(255,255,255,.09)',marginBottom:10}}>
          <div style={{color:'rgba(255,255,255,.65)',fontSize:14,fontWeight:500}}>💾 Save Evidence Package</div>
        </div>

        {/* Dev controls */}
        <div style={{display:'flex',gap:8}}>
          <button onClick={toggle} style={{flex:1,padding:'8px',borderRadius:10,border:alertMode?'1px solid rgba(0,208,100,.3)':'1px solid rgba(255,59,92,.3)',cursor:'pointer',fontFamily:'inherit',background:alertMode?'rgba(0,208,100,.12)':'rgba(255,59,92,.15)',color:alertMode?'#6ee7b7':'#ff8099',fontSize:12}}>
            {alertMode ? '✓ Dismiss SOS' : '⚠ Simulate SOS'}
          </button>
          <button onClick={()=>setFrozen(f=>!f)} style={{flex:1,padding:'8px',borderRadius:10,border:frozen?'1px solid rgba(245,158,11,.3)':'1px solid rgba(255,255,255,.1)',cursor:'pointer',fontFamily:'inherit',background:frozen?'rgba(245,158,11,.12)':'rgba(255,255,255,.06)',color:frozen?'#fcd34d':'rgba(255,255,255,.4)',fontSize:12}}>
            {frozen ? '▶ Unfreeze' : '⏸ Freeze Feed'}
          </button>
        </div>

        {/* home indicator */}
        <div style={{display:'flex',justifyContent:'center',paddingTop:10}}>
          <div style={{width:139,height:5,borderRadius:100,background:'rgba(255,255,255,.2)'}}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
