name: Import Epics and Stories to Issues/Project

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Warn if token missing
        run: |
          if [ -z "${{ secrets.SAFEHAVEN_PROJECT_TOKEN }}" ]; then
            echo "WARNING: SAFEHAVEN_PROJECT_TOKEN secret is not set. This workflow will fail."
          fi

      - name: Install dependencies (if any)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; skipping npm install."
          fi

      - name: Run importer
        env:
          GH_TOKEN: ${{ secrets.SAFEHAVEN_PROJECT_TOKEN }}
        run: node scripts/import-epics-stories.mjs